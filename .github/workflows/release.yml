name: Build and release

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
      - "[0-9]+.[0-9]+.[0-9]+*"
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: "Release/package version override"
        required: false
        default: ""

permissions:
  contents: write

env:
  OBS_VERSION: "32.1.2"
  OBS_DEPS_VERSION: "2025-07-11"
  BUILD_TYPE: RelWithDebInfo

jobs:
  core-tests:
    name: Core tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++

      - name: Configure
        run: cmake -S . -B build -G Ninja -DEASY_CONFIG_BUILD_PLUGIN=OFF

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  build-windows:
    name: Windows x64
    runs-on: windows-2022
    needs: core-tests
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.version }}" -ne "") {
            $Version = "${{ inputs.version }}"
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            $Version = "${{ github.ref_name }}" -replace '^v',''
          } else {
            $Version = "0.0.0-${{ github.run_number }}"
          }
          "value=$Version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install tools
        shell: pwsh
        run: choco install ninja nsis -y --no-progress

      - name: Download OBS and Qt dependencies
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force deps | Out-Null
          git clone --depth 1 --branch "$env:OBS_VERSION" https://github.com/obsproject/obs-studio.git deps/obs-studio
          bash scripts/download-github-release-asset.sh obsproject/obs-studio "$env:OBS_VERSION" "OBS-Studio-$env:OBS_VERSION-Windows-x64.zip" deps/obs-windows.zip
          bash scripts/download-github-release-asset.sh obsproject/obs-deps "$env:OBS_DEPS_VERSION" "windows-deps-qt6-$env:OBS_DEPS_VERSION-x64.zip" deps/windows-qt.zip
          Expand-Archive deps/obs-windows.zip -DestinationPath deps/windows-obs
          Expand-Archive deps/windows-qt.zip -DestinationPath deps/windows-qt

      - name: Create OBS import libraries
        shell: pwsh
        run: |
          $ObsBin = Get-ChildItem deps/windows-obs -Recurse -Filter obs.dll | Select-Object -First 1
          $FrontendBin = Get-ChildItem deps/windows-obs -Recurse -Filter obs-frontend-api.dll | Select-Object -First 1
          $VsWhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          if (!(Test-Path $VsWhere)) { throw "vswhere.exe was not found" }
          $VsInstallPath = & $VsWhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (!$VsInstallPath) { throw "Visual Studio C++ tools were not found" }
          $VcToolsBin = Get-ChildItem (Join-Path $VsInstallPath "VC\Tools\MSVC") -Directory |
            Sort-Object Name -Descending |
            ForEach-Object { Join-Path $_.FullName "bin\Hostx64\x64" } |
            Where-Object { Test-Path (Join-Path $_ "dumpbin.exe") -and Test-Path (Join-Path $_ "lib.exe") } |
            Select-Object -First 1
          if (!$VcToolsBin) { throw "Visual Studio Hostx64 x64 tool directory was not found" }
          $Dumpbin = Get-Item (Join-Path $VcToolsBin "dumpbin.exe")
          $LibExe = Get-Item (Join-Path $VcToolsBin "lib.exe")
          if (!$ObsBin) { throw "obs.dll was not found in windows OBS package" }
          if (!$FrontendBin) { throw "obs-frontend-api.dll was not found in windows OBS package" }

          $LibOutDir = Join-Path (Resolve-Path "deps").Path "windows-obs-libs"
          New-Item -ItemType Directory -Force $LibOutDir | Out-Null

          function New-ImportLib {
            param(
              [string]$DllPath,
              [string]$LibName
            )

            $DefPath = Join-Path $LibOutDir ($LibName + ".def")
            $LibPath = Join-Path $LibOutDir ($LibName + ".lib")
            $Exports = & $Dumpbin.FullName /nologo /exports $DllPath
            if ($LASTEXITCODE -ne 0) {
              throw "dumpbin failed for $DllPath"
            }

            $Symbols = foreach ($Line in $Exports) {
              if ($Line -match '^\s+\d+\s+[0-9A-F]+\s+[0-9A-F]+\s+(.+)$') {
                $Symbol = $Matches[1].Trim()
                if ($Symbol -and $Symbol -notmatch '^\[') {
                  $Symbol
                }
              }
            }

            if (!$Symbols) {
              throw "No exports found in $DllPath"
            }

            @(
              "LIBRARY $LibName"
              "EXPORTS"
            ) + $Symbols | Set-Content -Path $DefPath -Encoding ascii

            & $LibExe.FullName /nologo /def:$DefPath /machine:x64 /out:$LibPath
            if ($LASTEXITCODE -ne 0) {
              throw "lib.exe failed while creating import library for $DllPath"
            }
          }

          New-ImportLib -DllPath $ObsBin.FullName -LibName "obs"
          New-ImportLib -DllPath $FrontendBin.FullName -LibName "obs-frontend-api"

      - name: Locate dependency roots
        id: deps
        shell: pwsh
        run: |
          $ObsSource = Resolve-Path "deps/obs-studio"
          $ObsLib = Get-ChildItem deps/windows-obs-libs -Recurse -Filter obs.lib | Select-Object -First 1
          $QtConfig = Get-ChildItem deps/windows-qt -Recurse -Filter Qt6Config.cmake | Select-Object -First 1
          if (!$ObsLib) {
            Write-Host "Contents of deps/windows-obs-libs (first 200 entries):"
            Get-ChildItem deps/windows-obs-libs -Recurse -ErrorAction SilentlyContinue |
              Select-Object -First 200 FullName
            throw "obs.lib was not found in generated windows-obs-libs"
          }
          if (!$QtConfig) { throw "Qt6Config.cmake was not found in windows-qt" }
          $ObsLibDir = $ObsLib.Directory.FullName
          $QtPrefix = Split-Path -Parent (Split-Path -Parent (Split-Path -Parent $QtConfig.Directory.FullName))
          "obs_source=$ObsSource" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "obs_lib=$ObsLibDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "qt_prefix=$QtPrefix" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build-plugin -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_PREFIX_PATH="${{ steps.deps.outputs.qt_prefix }}" `
            -DOBS_SOURCE_DIR="${{ steps.deps.outputs.obs_source }}" `
            -DOBS_LIBRARY_DIR="${{ steps.deps.outputs.obs_lib }}" `
            -DEASY_CONFIG_INSTALL_LAYOUT=program

      - name: Build
        run: cmake --build build-plugin --config $env:BUILD_TYPE

      - name: Test
        run: ctest --test-dir build-plugin -C $env:BUILD_TYPE --output-on-failure

      - name: Package
        shell: pwsh
        run: scripts/package-windows.ps1 -BuildDir build-plugin -Version "${{ steps.version.outputs.value }}" -Configuration $env:BUILD_TYPE

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist/*

  build-macos:
    name: macOS universal
    runs-on: macos-15
    needs: core-tests
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.version }}" ]]; then
            version="${{ inputs.version }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.0.0-${GITHUB_RUN_NUMBER}"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Install tools
        run: brew install ninja

      - name: Download OBS and Qt dependencies
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mkdir -p deps
          git clone --depth 1 --branch "$OBS_VERSION" https://github.com/obsproject/obs-studio.git deps/obs-studio
          bash scripts/download-github-release-asset.sh obsproject/obs-deps "$OBS_DEPS_VERSION" "macos-deps-qt6-$OBS_DEPS_VERSION-universal.tar.xz" deps/macos-qt.tar.xz
          mkdir -p deps/macos-qt
          tar -xJf deps/macos-qt.tar.xz -C deps/macos-qt --strip-components=1

      - name: Locate dependency roots
        id: deps
        run: |
          qt_config="$(find "$PWD/deps/macos-qt" -name 'Qt6Config.cmake' -print -quit)"
          if [[ -z "$qt_config" ]]; then
            echo "Qt6Config.cmake was not found in macos-qt" >&2
            exit 1
          fi
          qt_prefix="$PWD/deps/macos-qt"
          {
            echo "obs_source=$PWD/deps/obs-studio"
            echo "qt_prefix=$qt_prefix"
          } >> "$GITHUB_OUTPUT"

      - name: Configure
        run: |
          cmake -S . -B build-plugin -G Ninja \
            -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_PREFIX_PATH="${{ steps.deps.outputs.qt_prefix }}" \
            -DOBS_SOURCE_DIR="${{ steps.deps.outputs.obs_source }}" \
            -DOBS_APP_FRAMEWORK_DIR="/Applications/OBS.app/Contents/Frameworks" \
            -DOBS_INSTALL_RPATH_FRAMEWORK_DIR="/Applications/OBS.app/Contents/Frameworks"

      - name: Build
        run: cmake --build build-plugin

      - name: Test
        run: ctest --test-dir build-plugin --output-on-failure

      - name: Package
        run: bash scripts/package-macos.sh build-plugin "${{ steps.version.outputs.value }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: dist/*

  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-24.04
    needs: core-tests
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.version }}" ]]; then
            version="${{ inputs.version }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.0.0-${GITHUB_RUN_NUMBER}"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ qt6-base-dev
          sudo apt-get install -y -t noble-backports libobs-dev obs-studio

      - name: Configure
        run: cmake -S . -B build-plugin -G Ninja -DCMAKE_BUILD_TYPE="$BUILD_TYPE"

      - name: Build
        run: cmake --build build-plugin

      - name: Test
        run: ctest --test-dir build-plugin --output-on-failure

      - name: Package
        run: bash scripts/package-linux.sh build-plugin "${{ steps.version.outputs.value }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: dist/*

  release:
    name: Draft GitHub release
    runs-on: ubuntu-24.04
    needs:
      - build-windows
      - build-macos
      - build-linux
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: artifacts/*
